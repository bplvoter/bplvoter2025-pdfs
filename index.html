<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>BPL Voter PDF Library</title>

<style>

body{
    font-family: Arial, sans-serif;
    max-width: 900px;
    margin: auto;
    padding: 20px;
    background: #f5f5f5;
}

h2{
    text-align: center;
}

a{
    display: block;
    background: white;
    margin: 8px 0;
    padding: 12px;
    border-radius: 8px;
    text-decoration: none;
    color: black;
    box-shadow: 0 1px 3px rgba(0,0,0,.15);
}

a:hover{
    background: #e9f2ff;
}

</style>
</head>

<body>

<h2>📂 BPL Voter PDF Library</h2>

<div id="pdfList"></div>

<script>

let html = "";

for(let part = 83; part <= 113; part++){

    let file =
    `S01-140-FinalRoll-Revision1-ENG-${part}-WI.pdf`;

    html += `
        <a href="${file}" target="_blank">
            📄 Part ${part}
        </a>
    `;
}

document.getElementById("pdfList").innerHTML = html;

</script>

</body>
</html>
